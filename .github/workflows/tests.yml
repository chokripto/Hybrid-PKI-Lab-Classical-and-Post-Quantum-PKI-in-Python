name: Tests

on:
  push:
    branches:
      - main
      - master
      - develop

  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  tests:
    name: Run Python Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.python-version }}-

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Show Python environment
        run: |
          python --version
          pip --version
          pip list

      - name: Verify package import
        run: |
          python -c "import hybrid_pki; print('hybrid_pki imported successfully')"

      - name: Verify FastAPI app import
        run: |
          python -c "from hybrid_pki.api.main import app; print(app.title)"

      - name: Run tests
        run: |
          pytest -v

      - name: Run tests with coverage
        run: |
          pytest -v --cov=hybrid_pki --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-python-${{ matrix.python-version }}
          path: coverage.xml